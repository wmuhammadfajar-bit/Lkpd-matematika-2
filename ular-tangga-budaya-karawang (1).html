<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Ular Tangga Budaya Karawang</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --wood:#c8860a;
  --wood-dark:#8b5e0a;
  --wood-light:#f5c842;
  --board-bg:#f5e6c0;
  --green1:#7bc67e;
  --green2:#4caf50;
  --green3:#2e7d32;
  --blue1:#90caf9;
  --orange1:#ffb74d;
  --red1:#ef9a9a;
  --purple1:#ce93d8;
  --gold:#ffd700;
}

body{
  font-family:'Nunito',sans-serif;
  background: radial-gradient(ellipse at top, #1a6b2e 0%, #0d4a1e 60%, #071a0b 100%);
  min-height:100vh;
  padding:12px;
  overflow-x:hidden;
}

/* Felt table texture */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image: repeating-linear-gradient(45deg,rgba(255,255,255,0.015) 0,rgba(255,255,255,0.015) 1px,transparent 0,transparent 50%);
  background-size:4px 4px;
  pointer-events:none;z-index:0;
}

#app{
  max-width:1140px;
  margin:0 auto;
  position:relative;z-index:1;
}

/* TITLE */
.game-title{
  text-align:center;
  margin-bottom:10px;
}
.game-title h1{
  font-family:'Boogaloo',cursive;
  font-size:38px;
  color:var(--gold);
  text-shadow:3px 3px 0 #7b3f00, 0 0 20px rgba(255,215,0,0.5);
  letter-spacing:1px;
}
.game-title p{
  font-size:13px;font-weight:700;
  color:rgba(255,255,255,0.7);
  letter-spacing:1px;
  text-transform:uppercase;
}

.music-btn{
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.3);
  border-radius:20px;padding:5px 14px;
  color:white;font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  margin-top:6px;
}
.music-btn:hover{background:rgba(255,255,255,0.2);}

/* MAIN LAYOUT */
.main-layout{
  display:flex;gap:12px;align-items:flex-start;
}

/* ===== BOARD ===== */
.board-wrapper{
  flex:1;
  background:linear-gradient(145deg,#8B5E0A,#C8860A,#F5C842,#C8860A,#8B5E0A);
  border-radius:16px;
  padding:10px;
  box-shadow:0 0 0 4px #7b3f00, 0 0 0 8px #f5c842, 0 0 0 12px #7b3f00,
             0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
  position:relative;
}

/* Wood grain overlay */
.board-wrapper::before{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:repeating-linear-gradient(
    90deg,
    transparent,transparent 40px,
    rgba(0,0,0,0.04) 40px,rgba(0,0,0,0.04) 41px
  ),repeating-linear-gradient(
    180deg,
    transparent,transparent 60px,
    rgba(255,255,255,0.03) 60px,rgba(255,255,255,0.03) 61px
  );
  pointer-events:none;z-index:0;border-radius:16px;
}

.board-inner{
  background:var(--board-bg);
  border-radius:10px;
  border:3px solid rgba(0,0,0,0.15);
  position:relative;
  overflow:hidden;
}

/* SVG overlay for snakes and ladders */
.board-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:5;
}

.board-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:0;
  position:relative;z-index:2;
}

/* ===== CELLS ===== */
.cell{
  aspect-ratio:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:3px 2px 2px;
  position:relative;
  border:1px solid rgba(0,0,0,0.12);
  cursor:default;
  overflow:hidden;
  transition:filter 0.2s;
}

.cell:hover{filter:brightness(1.08);}

.cell-num{
  font-family:'Boogaloo',cursive;
  font-size:13px;
  line-height:1;
  font-weight:400;
  color:rgba(0,0,0,0.55);
  align-self:flex-start;
  padding-left:2px;
}

.cell-icon{
  font-size:22px;line-height:1;
  margin-top:auto;margin-bottom:auto;
}

.cell-label{
  font-size:7px;font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-top:1px;
  color:rgba(0,0,0,0.5);
}

/* Cell color themes */
.c-normal:nth-child(odd){background:#fff8e8;}
.c-normal:nth-child(even){background:#fef0c0;}
.c-budaya{background:linear-gradient(135deg,#ffe082,#ffd54f);border:2px solid #f9a825 !important;}
.c-seni{background:linear-gradient(135deg,#e1bee7,#ce93d8);border:2px solid #9c27b0 !important;}
.c-kejutan{background:linear-gradient(135deg,#f8bbd0,#f48fb1);border:2px solid #e91e63 !important;}
.c-snake{background:linear-gradient(135deg,#ffcdd2,#ef9a9a);border:2px solid #e53935 !important;}
.c-ladder{background:linear-gradient(135deg,#c8e6c9,#a5d6a7);border:2px solid #43a047 !important;}
.c-start{background:linear-gradient(135deg,#b2dfdb,#80cbc4);border:2px solid #00897b !important;}
.c-finish{
  background:linear-gradient(135deg,#fff9c4,#ffe082,#ffd54f);
  border:3px solid var(--gold) !important;
  box-shadow:inset 0 0 8px rgba(255,215,0,0.5);
}

.highlight-cell{
  z-index:10;
  box-shadow: 0 0 0 3px #ff4444, 0 0 12px rgba(255,68,68,0.7) !important;
  filter:brightness(1.15);
  animation:cellPulse 0.6s infinite alternate;
}
@keyframes cellPulse{from{box-shadow:0 0 0 3px #ff4444,0 0 8px rgba(255,68,68,0.5);}to{box-shadow:0 0 0 4px #ff4444,0 0 20px rgba(255,68,68,0.9);}}

/* TOKENS on board */
.cell-tokens{
  position:absolute;
  bottom:3px;right:2px;
  display:flex;flex-wrap:wrap;gap:1px;
  justify-content:flex-end;
  max-width:36px;
  z-index:8;
}
.token{
  width:15px;height:15px;
  border-radius:50%;
  border:2px solid white;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:900;
  color:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
  position:relative;
  transition:transform 0.3s;
}
.token::after{
  content:'';position:absolute;top:2px;left:3px;
  width:5px;height:3px;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
}

/* START / FINISH special cells */
.start-content,.finish-content{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;gap:2px;
}
.start-content .big-icon,.finish-content .big-icon{font-size:28px;line-height:1;}
.start-content span,.finish-content span{
  font-family:'Boogaloo',cursive;font-size:11px;color:#1a5276;font-weight:400;
}

/* ===== RIGHT PANEL ===== */
.right-panel{
  width:190px;flex-shrink:0;
  display:flex;flex-direction:column;gap:10px;
}

/* Score cards */
.panel-title{
  font-family:'Boogaloo',cursive;
  font-size:18px;color:var(--gold);
  text-align:center;
  text-shadow:1px 1px 0 rgba(0,0,0,0.5);
  background:rgba(0,0,0,0.3);
  border-radius:10px;padding:5px;
  border:1px solid rgba(255,215,0,0.3);
}

.score-card{
  border-radius:12px;
  padding:10px 12px;
  border:2px solid transparent;
  position:relative;
  transition:all 0.3s;
  backdrop-filter:blur(4px);
}
.score-card.active{
  transform:scale(1.04) translateX(-3px);
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}
.score-card h3{font-size:12px;font-weight:800;margin-bottom:2px;}
.score-num{font-family:'Boogaloo',cursive;font-size:28px;line-height:1;}
.score-pos{font-size:10px;margin-top:2px;opacity:0.8;font-weight:700;}

.turn-star{
  position:absolute;top:-8px;right:-8px;
  background:var(--gold);
  border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
  border:2px solid white;
  animation:spin 1.5s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== DICE AREA ===== */
.dice-panel{
  background:rgba(0,0,0,0.3);
  border-radius:16px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
}

.info-bar{
  background:linear-gradient(90deg,rgba(124,58,237,0.8),rgba(219,39,119,0.8));
  border:1px solid rgba(255,255,255,0.2);
  color:white;border-radius:10px;
  padding:8px 12px;
  font-weight:800;font-size:12px;
  margin-bottom:10px;line-height:1.4;
  min-height:42px;display:flex;align-items:center;justify-content:center;
}

/* 3D Dice */
.dice-container{
  perspective:300px;
  width:80px;height:80px;
  margin:0 auto 10px;
  cursor:pointer;
}
.dice-3d{
  width:80px;height:80px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.1s;
}
.dice-3d.rolling{
  animation:diceRoll 0.15s linear infinite;
}
@keyframes diceRoll{
  0%{transform:rotateX(0deg) rotateY(0deg) rotateZ(0deg);}
  33%{transform:rotateX(120deg) rotateY(80deg) rotateZ(45deg);}
  66%{transform:rotateX(240deg) rotateY(160deg) rotateZ(90deg);}
  100%{transform:rotateX(360deg) rotateY(240deg) rotateZ(135deg);}
}
.dice-face{
  position:absolute;width:80px;height:80px;
  background:linear-gradient(145deg,#ffffff,#e0e0e0);
  border:3px solid #333;
  border-radius:14px;
  display:grid;
  align-items:center;justify-items:center;
  font-size:22px;
  box-shadow:inset 0 2px 4px rgba(255,255,255,0.8), inset 0 -2px 4px rgba(0,0,0,0.15);
}
.die-dots{display:grid;gap:6px;padding:8px;width:100%;height:100%;align-items:center;justify-items:center;}
.die-dot{
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#444,#111);
  box-shadow:0 1px 2px rgba(0,0,0,0.4);
}

/* Only show top face */
.dice-face:not(.top-face){display:none;}

.dice-btn{
  background:linear-gradient(135deg,#ff6b35,#f7c59f);
  border:none;border-radius:50px;
  padding:11px 20px;
  font-family:'Boogaloo',cursive;
  font-size:20px;color:#7b1500;
  cursor:pointer;
  box-shadow:0 4px 0 #c0392b, 0 6px 20px rgba(255,107,53,0.5);
  transition:all 0.15s;
  width:100%;
  border:2px solid rgba(255,255,255,0.4);
}
.dice-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #c0392b,0 8px 25px rgba(255,107,53,0.6);}
.dice-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c0392b;}
.dice-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none !important;box-shadow:0 2px 0 #999;}

.btn-restart{
  background:linear-gradient(135deg,#27ae60,#2ecc71);
  border:2px solid rgba(255,255,255,0.3);
  border-radius:10px;padding:8px;
  font-family:'Boogaloo',cursive;
  font-size:16px;color:white;
  cursor:pointer;transition:all 0.2s;
  width:100%;margin-top:6px;
  box-shadow:0 3px 0 #1a7a42;
}
.btn-restart:hover{transform:translateY(-1px);}
.btn-restart:active{transform:translateY(1px);box-shadow:0 1px 0 #1a7a42;}

/* Legend */
.legend-box{
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:8px;
  display:flex;flex-direction:column;gap:5px;
}
.legend-item{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:rgba(255,255,255,0.85);
}
.legend-dot{
  width:14px;height:14px;border-radius:3px;flex-shrink:0;
}

/* ===== POPUPS ===== */
.popup-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.75);
  z-index:1000;
  align-items:center;justify-content:center;
  padding:20px;
  backdrop-filter:blur(4px);
}
.popup-overlay.show{display:flex;}

.popup-box{
  background:white;
  border-radius:24px;
  padding:28px;
  max-width:480px;width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;
}
.popup-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,#7c3aed,#db2777,#f59e0b);
}
@keyframes popIn{from{transform:scale(0.6) rotate(-5deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}

.popup-header{
  font-family:'Boogaloo',cursive;
  font-size:26px;text-align:center;margin-bottom:14px;
}
.popup-question{
  font-size:15px;font-weight:700;
  text-align:center;color:#1e293b;
  margin-bottom:16px;line-height:1.6;
  background:linear-gradient(135deg,#f8f9ff,#f1f5f9);
  padding:14px;border-radius:14px;
  border:2px solid #e2e8f0;
}
.popup-options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.option-btn{
  background:#f1f5f9;border:2px solid #cbd5e1;
  border-radius:12px;padding:10px 16px;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  color:#475569;cursor:pointer;transition:all 0.2s;text-align:left;
}
.option-btn:hover{background:#7c3aed;color:white;border-color:#7c3aed;transform:translateX(6px);}
.option-btn.correct{background:#16a34a !important;color:white !important;border-color:#16a34a !important;}
.option-btn.wrong{background:#ef4444 !important;color:white !important;border-color:#ef4444 !important;}
.option-btn:disabled{cursor:not-allowed;transform:none !important;}

.result-msg{
  text-align:center;font-size:15px;font-weight:800;
  margin-bottom:10px;padding:12px;border-radius:12px;
}
.result-msg.correct{background:#dcfce7;color:#15803d;}
.result-msg.wrong{background:#fee2e2;color:#dc2626;}

.popup-close-btn{
  background:linear-gradient(135deg,#7c3aed,#db2777);
  border:none;border-radius:12px;padding:13px;
  color:white;font-family:'Boogaloo',cursive;font-size:20px;
  cursor:pointer;width:100%;transition:all 0.2s;
  box-shadow:0 4px 0 #5b21b6;
}
.popup-close-btn:hover{transform:translateY(-2px);}
.popup-close-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #5b21b6;}

/* Winner popup */
.winner-popup .popup-box{
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border:3px solid var(--gold);
  text-align:center;
  color:white;
}
.winner-popup .popup-box::before{background:linear-gradient(90deg,var(--gold),#ff6b35,var(--gold));}
.trophy-anim{
  font-size:80px;line-height:1;
  animation:trophyBounce 0.8s infinite alternate ease-in-out;
  display:inline-block;
  filter:drop-shadow(0 0 20px rgba(255,215,0,0.8));
}
@keyframes trophyBounce{from{transform:scale(1) rotate(-5deg);}to{transform:scale(1.1) rotate(5deg);}}

.winner-name{
  font-family:'Boogaloo',cursive;font-size:30px;
  margin:10px 0;
}

/* CONFETTI */
.confetti-piece{
  position:fixed;
  width:10px;height:14px;
  top:-20px;
  z-index:9999;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

/* Snake/Ladder move animation */
@keyframes tokenJump{
  0%{transform:scale(1);}
  50%{transform:scale(1.5) translateY(-8px);}
  100%{transform:scale(1);}
}

/* Snake/Ladder notification */
.sl-notification{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);color:white;
  border-radius:20px;padding:20px 30px;
  font-family:'Boogaloo',cursive;font-size:28px;
  z-index:500;text-align:center;
  border:3px solid var(--gold);
  animation:notifPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
@keyframes notifPop{from{transform:translate(-50%,-50%) scale(0.5);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}

/* Responsive */
@media(max-width:750px){
  .main-layout{flex-direction:column-reverse;}
  .right-panel{width:100%;}
  .score-cards-row{display:flex;gap:8px;flex-wrap:wrap;}
  .score-card{flex:1;min-width:130px;}
  .board-svg{display:none;}
}
</style>
</head>
<body>

<div id="app">
  <div class="game-title">
    <h1>🐍 Ular Tangga Budaya Karawang 🪜</h1>
    <p>🌾 Kearifan Lokal Karawang • IPAS Kelas IV SD 🌾</p>
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵 Musik: ON</button>
  </div>

  <div class="main-layout">
    <!-- BOARD -->
    <div class="board-wrapper" style="position:relative;z-index:1;">
      <div class="board-inner">
        <svg class="board-svg" id="boardSvg" viewBox="0 0 600 600" preserveAspectRatio="none"></svg>
        <div class="board-grid" id="board"></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <!-- Score -->
      <div class="panel-title">📊 Papan Skor</div>
      <div id="scoreboard" class="score-cards-row"></div>

      <!-- Legend -->
      <div class="legend-box">
        <div class="legend-item"><div class="legend-dot" style="background:#ffd54f;border:1px solid #f9a825;"></div>⭐ Budaya +5 poin</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ce93d8;border:1px solid #9c27b0;"></div>🎵 Soal Seni</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f48fb1;border:1px solid #e91e63;"></div>🎉 Tantangan</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef9a9a;border:1px solid #e53935;"></div>🐍 Ular Mundur</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a5d6a7;border:1px solid #43a047;"></div>🪜 Tangga Naik</div>
      </div>

      <!-- Dice -->
      <div class="dice-panel">
        <div class="info-bar" id="infoBar">🎯 Tekan dadu untuk mulai!</div>

        <div class="dice-container" onclick="rollDice()">
          <div class="dice-3d" id="dice3d">
            <div class="dice-face top-face" id="diceFace">
              <div class="die-dots" id="diceDots"></div>
            </div>
          </div>
        </div>

        <button class="dice-btn" id="diceBtn" onclick="rollDice()">🎲 Lempar Dadu!</button>
        <button class="btn-restart" onclick="restartGame()">🔄 Main Lagi</button>
      </div>
    </div>
  </div>
</div>

<!-- QUESTION POPUP -->
<div class="popup-overlay" id="questionPopup">
  <div class="popup-box">
    <div class="popup-header" id="popupHeader">❓ Pertanyaan!</div>
    <div class="popup-question" id="popupQuestion"></div>
    <div class="popup-options" id="popupOptions"></div>
    <div class="result-msg" id="resultMsg" style="display:none"></div>
    <button class="popup-close-btn" id="popupCloseBtn" onclick="closePopup()" style="display:none">✅ Lanjutkan!</button>
  </div>
</div>

<!-- WINNER POPUP -->
<div class="popup-overlay winner-popup" id="winnerPopup">
  <div class="popup-box">
    <div class="popup-header" style="color:var(--gold);font-size:32px">🏆 JUARA! 🏆</div>
    <div><span class="trophy-anim">🥇</span></div>
    <div class="winner-name" id="winnerName"></div>
    <div style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:14px;font-weight:700">Berhasil mencapai kotak 30 pertama! +20 bonus poin! 🎉</div>
    <div id="finalScores" style="margin-bottom:16px;font-size:14px;font-weight:700;line-height:2.2;color:rgba(255,255,255,0.9)"></div>
    <button class="btn-restart" style="width:100%;font-size:22px;padding:14px;margin-top:0" onclick="restartGame()">🎮 Main Lagi!</button>
  </div>
</div>

<script>
// ======================= AUDIO ENGINE =======================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let musicOn = true;
let bgInterval = null;
let bgNodes = [];

function getAudioCtx(){
  if(!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playBeep(freq, dur, type='sine', vol=0.3, delay=0){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  }catch(e){}
}

// Background music - cheerful melody
function startBgMusic(){
  if(!musicOn) return;
  const notes = [523,587,659,698,784,698,659,587,523,659,784,880,784,659,784,523];
  const ctx = getAudioCtx();
  let time = ctx.currentTime + 0.1;
  const tempo = 0.32;

  function schedule(){
    notes.forEach((f,i) => {
      try{
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0, time + i*tempo);
        gain.gain.linearRampToValueAtTime(0.08, time + i*tempo + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, time + i*tempo + tempo * 0.85);
        osc.start(time + i*tempo);
        osc.stop(time + i*tempo + tempo);
        bgNodes.push(osc);
      }catch(e){}
    });
    // Bass
    [0,4,8,12].forEach(i => {
      try{
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = notes[i]/2;
        gain.gain.setValueAtTime(0, time + i*tempo);
        gain.gain.linearRampToValueAtTime(0.06, time + i*tempo + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, time + i*tempo + tempo*0.7);
        osc.start(time + i*tempo);
        osc.stop(time + i*tempo + tempo);
        bgNodes.push(osc);
      }catch(e){}
    });
  }

  schedule();
  bgInterval = setInterval(() => {
    if(!musicOn) return;
    time = (audioCtx ? audioCtx.currentTime : 0) + 0.05;
    schedule();
  }, notes.length * tempo * 1000);
}

function stopBgMusic(){
  if(bgInterval) clearInterval(bgInterval);
  bgNodes.forEach(n => { try{n.stop();}catch(e){} });
  bgNodes = [];
}

function toggleMusic(){
  musicOn = !musicOn;
  document.getElementById('musicBtn').textContent = '🎵 Musik: ' + (musicOn ? 'ON' : 'OFF');
  if(musicOn) { getAudioCtx(); startBgMusic(); }
  else stopBgMusic();
}

// Start music on first interaction
document.addEventListener('click', function startAudio(){
  getAudioCtx();
  if(musicOn && !bgInterval) startBgMusic();
  document.removeEventListener('click', startAudio);
}, {once: true});

function getCellClass(type){

function getCellIcon(type,num){
  if(num===1) return null;
  if(num===30) return '🌟';
  if(type==='budaya') return '⭐';
  if(type==='seni') return '🎵';
  if(type==='kejutan') return '🎉';
  if(type==='snake') return '🐍';
  if(type==='ladder') return '🪜';
  return '';
}

function buildBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';

  const cells = [];
  for(let vr=0;vr<5;vr++){
    const boardRow=4-vr;
    for(let vc=0;vc<6;vc++){
      let col=(boardRow%2===0)?vc:(5-vc);
      cells.push(boardRow*6+col+1);
    }
  }

  cells.forEach(num => {
    const type = CELL_TYPES[num]||'normal';
    const div = document.createElement('div');
    div.className = 'cell '+getCellClass(type);
    div.id = 'cell-'+num;

    if(num===1){
      div.innerHTML = `<div class="start-content"><div class="big-icon">🏁</div><span>START</span><div class="cell-tokens" id="tokens-1"></div></div>`;
    } else if(num===30){
      div.innerHTML = `<div class="finish-content"><div class="big-icon">🏆</div><span>FINISH!</span><div class="cell-tokens" id="tokens-30"></div></div>`;
    } else {
      const icon = getCellIcon(type, num);
      div.innerHTML = `<span class="cell-num">${num}</span>${icon ? `<span class="cell-icon">${icon}</span>` : ''}${type!=='normal'?`<span class="cell-label">${type==='budaya'?'Budaya':type==='seni'?'Soal':type==='kejutan'?'Kejutan':type==='snake'?'Ular':type==='ladder'?'Tangga':''}</span>`:''}
      <div class="cell-tokens" id="tokens-${num}"></div>`;
    }
    board.appendChild(div);
  });

  requestAnimationFrame(() => drawSnakesAndLadders());
}

// ======================= SVG SNAKES & LADDERS =======================
function getCellCenter(num){
  const el = document.getElementById('cell-'+num);
  const board = document.querySelector('.board-inner');
  if(!el || !board) return null;
  const br = board.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return {
    x: ((er.left - br.left + er.width/2) / br.width) * 600,
    y: ((er.top - br.top + er.height/2) / br.height) * 600
  };
}

function drawSnakesAndLadders(){
  const svg = document.getElementById('boardSvg');
  svg.innerHTML = '';

  // Ladders
  Object.entries(LADDERS).forEach(([from, to]) => {
    const f = getCellCenter(+from);
    const t = getCellCenter(+to);
    if(!f||!t) return;
    const dx = t.x - f.x, dy = t.y - f.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const nx = -dy/len * 12, ny = dx/len * 12;

    // Two rails
    for(let side of [-1,1]){
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', f.x + nx*side); line.setAttribute('y1', f.y + ny*side);
      line.setAttribute('x2', t.x + nx*side); line.setAttribute('y2', t.y + ny*side);
      line.setAttribute('stroke','#8B4513'); line.setAttribute('stroke-width','5');
      line.setAttribute('stroke-linecap','round');
      svg.appendChild(line);
    }
    // Rungs
    const steps = Math.ceil(len/22);
    for(let i=1;i<=steps;i++){
      const rung = document.createElementNS('http://www.w3.org/2000/svg','line');
      const rx = f.x + dx/len*i*(len/(steps+1));
      const ry = f.y + dy/len*i*(len/(steps+1));
      rung.setAttribute('x1', rx + nx*1.1); rung.setAttribute('y1', ry + ny*1.1);
      rung.setAttribute('x2', rx - nx*1.1); rung.setAttribute('y2', ry - ny*1.1);
      rung.setAttribute('stroke','#D2691E'); rung.setAttribute('stroke-width','4');
      rung.setAttribute('stroke-linecap','round');
      svg.appendChild(rung);
    }
    // Arrow tip
    const arr = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    const ux = dx/len, uy = dy/len;
    const ax = t.x - ux*14, ay = t.y - uy*14;
    arr.setAttribute('points', `${t.x},${t.y} ${ax+ny/2},${ay-nx/2} ${ax-ny/2},${ay+nx/2}`);
    arr.setAttribute('fill','#27ae60');
    svg.appendChild(arr);
  });

  // Snakes
  Object.entries(SNAKES).forEach(([from, to]) => {
    const f = getCellCenter(+from);
    const t = getCellCenter(+to);
    if(!f||!t) return;
    const midX = (f.x+t.x)/2 + (t.y-f.y)*0.3;
    const midY = (f.y+t.y)/2 + (f.x-t.x)*0.3;

    // Snake body (thick bezier)
    const body = document.createElementNS('http://www.w3.org/2000/svg','path');
    body.setAttribute('d', `M${f.x},${f.y} Q${midX},${midY} ${t.x},${t.y}`);
    body.setAttribute('stroke','#2d7a3a'); body.setAttribute('stroke-width','12');
    body.setAttribute('fill','none'); body.setAttribute('stroke-linecap','round');
    svg.appendChild(body);

    // Snake scale pattern (lighter overlay)
    const scale = document.createElementNS('http://www.w3.org/2000/svg','path');
    scale.setAttribute('d', `M${f.x},${f.y} Q${midX},${midY} ${t.x},${t.y}`);
    scale.setAttribute('stroke','#4caf50'); scale.setAttribute('stroke-width','7');
    scale.setAttribute('fill','none'); scale.setAttribute('stroke-dasharray','10,8');
    svg.appendChild(scale);

    // Snake head (circle at 'from')
    const head = document.createElementNS('http://www.w3.org/2000/svg','circle');
    head.setAttribute('cx', f.x); head.setAttribute('cy', f.y);
    head.setAttribute('r','10'); head.setAttribute('fill','#e53935');
    svg.appendChild(head);

    // Eyes
    const dx = (midX-f.x), dy = (midY-f.y);
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const ex = -dy/len * 5, ey = dx/len * 5;
    [1,-1].forEach(s => {
      const eye = document.createElementNS('http://www.w3.org/2000/svg','circle');
      eye.setAttribute('cx', f.x + ex*s + dx/len*6);
      eye.setAttribute('cy', f.y + ey*s + dy/len*6);
      eye.setAttribute('r','2.5'); eye.setAttribute('fill','white');
      svg.appendChild(eye);
    });

    // Tail tip (arrowhead at 'to')
    const dx2 = t.x-midX, dy2 = t.y-midY;
    const len2 = Math.sqrt(dx2*dx2+dy2*dy2)||1;
    const ux = dx2/len2, uy = dy2/len2;
    const arr = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    const ax = t.x - ux*12, ay = t.y - uy*12;
    const perp = 5;
    arr.setAttribute('points', `${t.x},${t.y} ${ax+uy*perp},${ay-ux*perp} ${ax-uy*perp},${ay+ux*perp}`);
    arr.setAttribute('fill','#b71c1c');
    svg.appendChild(arr);
  });
}

}

// ======================= MOVEMENT =======================
function moveTeam(teamIdx, steps){
  let pos = positions[teamIdx];
  const target = Math.min(pos + steps, 30);
  let step = pos;

  const interval = setInterval(() => {
    step++;
    if(step > target){
      clearInterval(interval);
      positions[teamIdx] = target;
      renderTokens();
      playMoveSound();

      if(target === 30){ setTimeout(()=>showWinner(teamIdx), 400); return; }

      if(SNAKES[target]){
        const dest = SNAKES[target];
        setTimeout(() => {
          showSlNotif(`🐍 Oh tidak! Kena Ular!\nMundur ke kotak ${dest}!`, '#ef4444');
          playSnakeSound();
          setTimeout(() => {
            positions[teamIdx] = dest;
            renderTokens();
            setTimeout(() => handleCellAction(teamIdx, dest), 600);
          }, 1400);
        }, 400);
        return;
      }
      if(LADDERS[target]){
        const dest = LADDERS[target];
        setTimeout(() => {
          showSlNotif(`🪜 Hore! Naik Tangga!\nMaju ke kotak ${dest}!`, '#16a34a');
          playLadderSound();
          setTimeout(() => {
            positions[teamIdx] = dest;
            renderTokens();
            setTimeout(() => handleCellAction(teamIdx, dest), 600);
          }, 1400);
        }, 400);
        return;
      }
      setTimeout(() => handleCellAction(teamIdx, target), 400);
      return;
    }
    positions[teamIdx] = step;
    renderTokens();
  }, 200);
}

function showSlNotif(msg, color){
  const old = document.querySelector('.sl-notification');
  if(old) old.remove();
  const el = document.createElement('div');
  el.className = 'sl-notification';
  el.style.borderColor = color;
  el.style.color = color;
  el.innerHTML = msg.replace('\n','<br>');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

function handleCellAction(teamIdx, pos){
  const type = CELL_TYPES[pos]||'normal';
  const team = TEAMS[teamIdx];
  if(type==='budaya'){
    scores[teamIdx]+=5; renderScoreboard();
    setInfo(`⭐ ${team.emoji} ${team.name} dapat Bonus Budaya +5 poin! Total: ${scores[teamIdx]}`);
    playCorrectSound();
    setTimeout(()=>nextTurn(), 1800);
    return;
  }
  if(type==='seni'){
    const q = QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
    showQuestion(teamIdx, q);
    return;
  }
  if(type==='kejutan'){
    const c = CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
    showChallenge(teamIdx, c);
    return;
  }
  nextTurn();
}

    optsDiv.appendChild(btn);
  });
  pendingCloseAction = () => nextTurn();
  document.getElementById('questionPopup').classList.add('show');
}

function answerQuestion(teamIdx, chosen, q, clickedBtn){
  const correct = chosen === q.ans;
  document.querySelectorAll('.option-btn').forEach((btn,i) => {
    btn.disabled = true;
    if(i===q.ans) btn.classList.add('correct');
    else if(btn===clickedBtn && !correct) btn.classList.add('wrong');
  });
  const rm = document.getElementById('resultMsg');
  rm.style.display = 'block';
  if(correct){
    scores[teamIdx] += q.points;
    rm.className = 'result-msg correct';
    rm.textContent = `🎉 BENAR! +${q.points} poin! Total: ${scores[teamIdx]} poin`;
    playCorrectSound();
  } else {
    rm.className = 'result-msg wrong';
    rm.textContent = `😢 Salah! Jawaban benar: ${q.opts[q.ans]}. Mundur 1 langkah!`;
    playWrongSound();
    pendingCloseAction = () => { if(positions[teamIdx]>1) positions[teamIdx]--; renderTokens(); nextTurn(); };
  }
  renderScoreboard();
  document.getElementById('popupCloseBtn').style.display = 'block';
}

function showChallenge(teamIdx, c){
  const team = TEAMS[teamIdx];
  document.getElementById('popupHeader').textContent = `🎉 Tantangan untuk ${team.emoji} ${team.name}!`;
  document.getElementById('popupHeader').style.color = team.color;
  document.getElementById('popupQuestion').textContent = c.q;
  document.getElementById('popupOptions').innerHTML = '';
  document.getElementById('resultMsg').style.display = 'none';
  document.getElementById('popupCloseBtn').style.display = 'none';

  const btn1 = document.createElement('button');
  btn1.className = 'option-btn';
  btn1.style.cssText = 'background:#dcfce7;color:#166534;border-color:#16a34a;text-align:center;';
  btn1.textContent = '✅ Tantangan Berhasil! (+15 poin)';
  btn1.onclick = () => {
    scores[teamIdx] += 15; renderScoreboard();
    document.getElementById('popupOptions').innerHTML = '';
    const rm = document.getElementById('resultMsg');
    rm.style.display='block'; rm.className='result-msg correct';
    rm.textContent = `🌟 Luar biasa! +15 poin! Total: ${scores[teamIdx]} poin`;
    playCorrectSound();
    document.getElementById('popupCloseBtn').style.display='block';
    pendingCloseAction = () => nextTurn();
  };
  const btn2 = document.createElement('button');
  btn2.className = 'option-btn';
  btn2.style.cssText = 'background:#fee2e2;color:#991b1b;border-color:#ef4444;text-align:center;';
  btn2.textContent = '❌ Lewati Tantangan (0 poin)';
  btn2.onclick = () => {
    document.getElementById('popupOptions').innerHTML = '';
    const rm = document.getElementById('resultMsg');
    rm.style.display='block'; rm.className='result-msg wrong';
    rm.textContent = 'Tantangan dilewati. Tidak ada poin tambahan.';
    playWrongSound();
    document.getElementById('popupCloseBtn').style.display='block';
    pendingCloseAction = () => nextTurn();
  };
  document.getElementById('popupOptions').appendChild(btn1);
  document.getElementById('popupOptions').appendChild(btn2);
  document.getElementById('questionPopup').classList.add('show');
}

function closePopup(){
  document.getElementById('questionPopup').classList.remove('show');
  if(pendingCloseAction){ pendingCloseAction(); pendingCloseAction=null; }
}

function nextTurn(){
  currentTeam = (currentTeam+1)%4;
  rolling = false;
  document.getElementById('diceBtn').disabled = false;
  renderScoreboard(); renderTokens();
  setInfo(`Giliran ${TEAMS[currentTeam].emoji} ${TEAMS[currentTeam].name}! Lempar dadu!`);
}

// ======================= WINNER =======================
function showWinner(teamIdx){
  const team = TEAMS[teamIdx];
  scores[teamIdx] += 20; renderScoreboard();
  document.getElementById('winnerName').textContent = `${team.emoji} ${team.name}`;
  document.getElementById('winnerName').style.color = team.color;
  const sorted = scores.map((s,i) => ({name:TEAMS[i].name,score:s,emoji:TEAMS[i].emoji,color:TEAMS[i].color}))
    .sort((a,b) => b.score - a.score);
  document.getElementById('finalScores').innerHTML = sorted.map((t,i) =>
    `<div style="color:${t.color}">${['🥇','🥈','🥉','4️⃣'][i]} ${t.emoji} ${t.name}: <strong>${t.score} poin</strong></div>`
  ).join('');
  playWinSound();
  launchConfetti();
  setTimeout(() => document.getElementById('winnerPopup').classList.add('show'), 600);
}

// ======================= CONFETTI =======================
function launchConfetti(){
  const colors = ['#ffd700','#ff6b35','#ef4444','#3b82f6','#16a34a','#a855f7','#ec4899','#06b6d4'];
  for(let i=0;i<80;i++){
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100+'vw';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.width = (6+Math.random()*10)+'px';
      el.style.height = (8+Math.random()*12)+'px';
      el.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5+Math.random()*2)+'s';
      el.style.animationDelay = (Math.random()*0.5)+'s';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i*40);
  }
}

// ======================= RESTART =======================
function restartGame(){
  scores=[0,0,0,0]; positions=[0,0,0,0]; currentTeam=0; rolling=false;
  document.getElementById('diceBtn').disabled = false;
  renderDiceFace(1);
  document.getElementById('winnerPopup').classList.remove('show');
  document.getElementById('questionPopup').classList.remove('show');
  buildBoard(); renderTokens(); renderScoreboard();
  setInfo(`Giliran ${TEAMS[0].emoji} ${TEAMS[0].name}! Lempar dadu!`);
}

// ======================= INIT =======================
buildBoard();
renderTokens();
renderScoreboard();
renderDiceFace(1);
setInfo(`Giliran ${TEAMS[0].emoji} ${TEAMS[0].name}! Lempar dadu!`);

// Redraw SVG on resize
window.addEventListener('resize', () => {
  clearTimeout(window._resizeTimer);
  window._resizeTimer = setTimeout(drawSnakesAndLadders, 200);
});
</script>
